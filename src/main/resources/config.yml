# General dialog settings
dialogs:
  # Allow players to close dialogs by pressing escape
  allow-escape-close: false
  # Number of button columns in dialogs
  button-columns: 2
  # Default input field width
  input-width: 150
  # Show authentication dialogs during configuration phase (before player joins)
  # When enabled, players must authenticate before fully joining the server
  # When disabled, dialogs are shown after the player joins (default behavior)
  use-configuration-phase: false
  # Timeout in seconds for configuration phase authentication (default: 60)
  # After this time, the player will be disconnected if not authenticated
  configuration-phase-timeout: 60
  # Respect AuthMe session settings in configuration phase.
  # If enabled, registered players with a valid AuthMe session are not forced into the pre-join login dialog.
  configuration-phase-respect-authme-sessions: true
  # FastLogin compatibility mode for configuration phase.
  # If FastLogin is present, registered players are checked shortly after join instead of being blocked pre-join.
  configuration-phase-fastlogin-compatibility: true
  # Delay in ticks before post-join auth dialog fallback when compatibility mode defers pre-join checks.
  configuration-phase-deferred-login-check-delay-ticks: 40

# Login dialog configuration
login-dialog:
  title: "<white><bold>Welcome Back!</bold></white>"
  body:
    - "<gray>Please enter your password to continue.</gray>"
    - "<dark_gray>If you forgot your password, contact staff.</dark_gray>"
  password-label: "Password"
  submit-button: "<green>Sign In</green>"
  forgot-button-enabled: true
  forgot-button: "<yellow>Forgot Password?</yellow>"
  forgot-button-template: "/email recover"
  cancel-button-enabled: true
  cancel-button: "<red>Cancel</red>"
  # Custom action buttons (optional)
  # actions:
  #   - type: submit
  #     label: "<green>Login</green>"
  #   - type: forgot
  #     label: "<yellow>Forgot Password?</yellow>"
  #   - type: cancel
  #     label: "<red>Cancel</red>"
  #   - type: command
  #     label: "<yellow>Help</yellow>"
  #     template: "/help login"
  #   - type: url
  #     label: "<aqua>Website</aqua>"
  #     template: "https://example.com/help"

# Registration dialog configuration
register-dialog:
  title: "<white><bold>Create Account</bold></white>"
  body:
    - "<gray>Welcome! Create a secure password below.</gray>"
    - "<dark_gray>Your password protects your progress.</dark_gray>"
  password-label: "Password"
  confirm-label: "Confirm Password"
  email-label: "Email Address"
  submit-button: "<green>Register</green>"

# Server rules dialog (shown before registration)
rules-dialog:
  enabled: true
  title: "<white><bold>Server Rules</bold></white>"
  body:
    - "<yellow><bold>Please read and accept our rules:</bold></yellow>"
    - ""
    - "<gray>1. No cheating, hacking, or exploits</gray>"
    - "<gray>2. Be respectful to all players</gray>"
    - "<gray>3. No advertising or spam</gray>"
    - "<gray>4. Follow staff instructions</gray>"
    - "<gray>5. Have fun and play fair!</gray>"
    - ""
    - "<dark_gray>Click confirm to accept and continue.</dark_gray>"
  # Agreement checkbox settings
  agreement:
    enabled: true
    checkbox-key: "rules_accepted"
    label: "<gray>I have read and agree to the server rules</gray>"
  confirm-button: "<green>I Accept</green>"

# All customizable messages
messages:
  # Login messages
  login:
    password-empty: "<red>Please enter your password!</red>"
    password-incorrect: "<red>Incorrect password. Please try again.</red>"
    not-registered: "<yellow>You don't have an account. Please register first!</yellow>"
    cancelled: "<yellow>Authentication cancelled.</yellow>"
    success: "<green>Successfully logged in! Welcome back.</green>"

  # Registration messages
  register:
    password-required: "<red>Please enter a password.</red>"
    fields-empty: "<red>Please enter a password.</red>"
    confirm-required: "<red>Please confirm your password.</red>"
    email-required: "<red>Please enter your email address.</red>"
    email-invalid: "<red>Please enter a valid email address.</red>"
    prejoin-email-unsupported: "<red>Email-based registration is not supported in pre-join mode. Please use in-game mode.</red>"
    passwords-mismatch: "<red>Passwords do not match. Please try again.</red>"
    password-too-short: "<red>Password must be at least <white>%min%</white> characters!</red>"
    password-too-long: "<red>Password cannot exceed <white>%max%</white> characters!</red>"
    password-invalid: "<red>Invalid password format. Please try again.</red>"
    already-registered: "<yellow>You already have an account. Please login instead!</yellow>"
    failed: "<red>Registration failed. Please try again.</red>"
    success: "<green>Account created successfully! Welcome!</green>"

  # Rules dialog messages
  rules:
    must-accept: "<red>You must accept the rules to continue!</red>"

  # Command messages
  commands:
    no-permission: "<red>You don't have permission to do that!</red>"
    player-only: "<red>This command can only be used by players!</red>"
    authme-unavailable: "<red>AuthMe is not available!</red>"
    config-reloaded: "<green>AuthMeUI configuration reloaded successfully!</green>"
    usage: "<yellow>Usage: /%command% show <login|register> | reload</yellow>"
    dialog-opened: "<gray>Dialog opened.</gray>"
    invalid-dialog: "<yellow>Invalid dialog type. Use: login or register</yellow>"

# Analytics settings (bStats)
metrics:
  enabled: true
